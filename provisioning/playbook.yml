- name: Shared storage — LIO iSCSI block target on the additional disk
  hosts: debian-desktop
  become: true
  vars:
    iscsi_target_iqn: iqn.2026-04.local.globalfinancial:lun0
    iscsi_block_name: lun0
  roles:
    - name: ansible-role-user-access
      user_access_username: localuser
      user_access_password: Password123!
      user_access_rdp: True
      user_access_admin: True
  tasks:
    - name: Install targetcli
      ansible.builtin.apt:
        name: targetcli-fb
        state: present
        update_cache: yes
        cache_valid_time: 3600
